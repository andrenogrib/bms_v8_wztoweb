<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BMS V8 WZ Database</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="manifest.js"></script>
</head>
<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-card">
      <h1 class="loading-title">BMS V8 WZ Database</h1>
      <p id="loadingText" class="loading-text">Carregando base de dados...</p>
      <div class="loading-track">
        <div id="loadingBar" class="loading-bar"></div>
      </div>
    </div>
  </div>

  <main class="app-shell">
    <header class="hero-panel">
      <div>
        <h1 class="hero-title">
          <img class="hero-logo" src="logo.png" alt="">
          <span>BMS V8 WZ Database</span>
        </h1>
        <p class="hero-subtitle">Consulta por abas, nome ou ID.</p>
      </div>
      <div class="metrics">
        <article class="metric">
          <span class="metric-label">Total</span>
          <strong id="metricTotal">0</strong>
        </article>
        <article class="metric">
          <span class="metric-label">Abas</span>
          <strong id="metricTabs">0</strong>
        </article>
        <article class="metric">
          <span class="metric-label">Resultado</span>
          <strong id="metricFiltered">0</strong>
        </article>
      </div>
    </header>

    <section class="tabs-panel" aria-label="Tabs">
      <div id="tabStrip" class="tab-strip" role="tablist"></div>
    </section>

    <section class="controls-panel">
      <label class="control search">
        <span>Buscar</span>
        <input id="searchInput" type="search" placeholder="Digite o nome ou ID">
      </label>
      <div class="control reset-wrap">
        <span>Acao</span>
        <button id="resetFiltersBtn" class="ghost-btn" type="button">Limpar busca</button>
      </div>
    </section>

    <section class="workspace">
      <section class="results-panel">
        <header class="results-header">
          <p id="resultsMeta" class="results-meta">Carregando registros...</p>
        </header>
        <div id="resultsRoot" class="results-root"></div>
        <div class="load-more-row">
          <button id="loadMoreBtn" class="load-more-btn" type="button">Carregar mais</button>
        </div>
      </section>

      <aside id="detailsPanel" class="details-panel">
        <div class="details-empty">
          <h2>Detalhes</h2>
          <p>Selecione um registro para ver as informacoes completas.</p>
        </div>
      </aside>
    </section>
  </main>

  <noscript>
    <div class="noscript-banner">Esta pagina precisa de JavaScript ativo.</div>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
